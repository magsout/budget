<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb" />
      <stop offset="1" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcd34d" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)" />

  <!-- coin dropping into the slot -->
  <circle cx="256" cy="150" r="46" fill="url(#coin)" />
  <g fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round">
    <path d="M276 130 A 25 25 0 1 0 276 170" />
    <line x1="232" y1="144" x2="272" y2="144" />
    <line x1="232" y1="156" x2="266" y2="156" />
  </g>

  <!-- piggy bank -->
  <g fill="#fff">
    <path d="M150 236 L190 166 L228 238 Z" />
    <ellipse cx="244" cy="312" rx="150" ry="116" />
    <ellipse cx="378" cy="314" rx="54" ry="46" />
    <rect x="196" y="404" width="48" height="52" rx="16" />
    <rect x="292" y="404" width="48" height="52" rx="16" />
  </g>
  <path d="M98 302 q-28 -4 -22 -30 q5 -18 24 -10" fill="none" stroke="#fff" stroke-width="15" stroke-linecap="round" />

  <!-- coin slot, eye, nostrils -->
  <rect x="210" y="236" width="74" height="16" rx="8" fill="#1e3a8a" />
  <circle cx="322" cy="280" r="12" fill="#1e3a8a" />
  <ellipse cx="366" cy="314" rx="7" ry="10" fill="#1e3a8a" />
  <ellipse cx="392" cy="314" rx="7" ry="10" fill="#1e3a8a" />
</svg>
